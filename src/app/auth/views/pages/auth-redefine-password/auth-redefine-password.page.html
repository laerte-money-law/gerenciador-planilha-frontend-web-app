<div class="d-flex flex-center flex-column flex-column-fluid">
    <div class="w-lg-500px p-10 p-lg-15 mx-auto">
        <form class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework" (ngSubmit)="onSubmit()">
            <div class="text-center mb-10">
                <h1 class="text-gray-900 mb-3">Redefinir Senha</h1>
                <div class="text-gray-500 fw-semibold fs-4">
                    Por favor, redefina sua senha para continuar navegando.
                </div>
            </div>

            <div class="mb-9">
                <app-input-text
                    #inputPassword
                    label="Nova Senha"
                    type="password"
                    [required]="true"
                    [disabled]="!isFormInEditableState(formState)"
                ></app-input-text>
            </div>

            <div class="mb-9">
                <app-input-text
                    #inputConfirmPassword
                    label="Confirmar Nova Senha"
                    type="password"
                    [required]="true"
                    [disabled]="!isFormInEditableState(formState)"
                ></app-input-text>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-lg btn-primary w-100 mb-5" (click)="onSubmit()">
                    <span class="indicator-label"> Salvar Nova Senha </span>
                </button>
            </div>
        </form>
    </div>
</div>

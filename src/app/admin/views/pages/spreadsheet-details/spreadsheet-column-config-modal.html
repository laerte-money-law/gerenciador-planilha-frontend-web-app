<div>
    <div class="modal-header">
        <h4 class="modal-title">Configurar Colunas</h4>
        <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
    </div>
    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div class="mb-3">
            <p class="text-muted">Selecione as colunas que deseja exibir:</p>
            <div *ngFor="let col of allColumns" class="form-check mb-2">
                <input class="form-check-input" type="checkbox"
                       [id]="'col_' + col"
                       [checked]="visibleColumns.has(col)"
                       (change)="toggleColumn(col)" />
                <label class="form-check-label" [for]="'col_' + col" style="cursor: pointer;">
                    {{ formatColumnName(col) }}
                </label>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light" (click)="activeModal.dismiss()">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="save()">Salvar</button>
    </div>
</div>

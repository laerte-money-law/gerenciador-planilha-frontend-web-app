<div class="d-flex justify-content-end mb-4">
  <button class="btn btn-primary" (click)="openCreateUserModal()">
    Criar usuário
  </button>
</div>

<div class="row">
  <div class="col-12">
    <div class="card card-flush mb-5 mb-xl-10">

      <div class="card-header">
        <h2 class="card-title">Usuários cadastrados</h2>
      </div>

      <div class="card-body py-4" *ngIf="allRecords?.length > 0">

        <div class="table-responsive">
          <table class="table table-striped align-middle fs-7">

            <thead>
              <tr class="text-muted fw-bold text-uppercase">
                <th>Nome</th>
                <th>Email</th>
                <th>Time</th>
                <th *ngIf="isAdmin">Cliente</th>
                <th>Perfil</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let clientUser of pagination?.getPage()">

                <td>{{clientUser.name}}</td>

                <td>{{clientUser.email}}</td>

                <td>{{clientUser.team?.name}}</td>
                <td *ngIf="isAdmin">{{clientUser.client?.companyName || 'N/A'}}</td>

                <td>
                  {{
                  clientUser.role === 'ADMIN' ? 'Administrador' :
                  clientUser.role === 'CLIENT' ? 'Cliente' :
                  'Usuário'
                  }}
                </td>

                <td class="text-end">
                  <span ngbDropdown container="body">
                    <a role="button"
                      class="btn btn-light btn-active-light-primary btn-flex btn-center btn-sm text-gray-600"
                      ngbDropdownToggle>
                      Ações
                      <i class="fa-solid fa-angle-down fs-6 ms-2 text-gray-600"></i>
                    </a>
                    <div
                      class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-semibold fs-7 w-125px py-4"
                      ngbDropdownMenu>

                      <div class="menu-item px-3">
                        <a role="button" class="menu-link px-3" (click)="onEditUser(clientUser)"> Editar </a>
                      </div>

                      <div class="menu-item px-3">
                        <a role="button" class="menu-link px-3" (click)="onDeleteClientUser(clientUser.id)">
                          Excluir
                        </a>
                      </div>
                    </div>
                  </span>
                </td>

              </tr>
            </tbody>

          </table>
        </div>

      </div>

    </div>
  </div>
  <!-- Paginação -->

  <div id="" class="row" *ngIf="pagination?.getTotalPages() > 1">
    <div id=""
      class="col-sm-12 col-md-5 d-flex align-items-center justify-content-center justify-content-md-start dt-toolbar">
    </div>
    <div id="" class="col-sm-12 col-md-7 d-flex align-items-center justify-content-center justify-content-md-end">
      <div class="dt-paging paging_simple_numbers">
        <nav>
          <ul class="pagination">
            <li class="dt-paging-button page-item" [class]="pagination?.isFirstPage() ? 'disabled' : ''">
              <button class="page-link previous" role="link" type="button" (click)="pagination?.goToPreviousPage()">
                <i class="previous"></i>
              </button>
            </li>
            <li class="dt-paging-button page-item" *ngFor="let pageNumber of pagination?.getTotalPagesAsArray()"
              [ngClass]="{ active: pageNumber === pagination?.getCurrentPage() }">
              <button class="page-link" role="link" type="button" (click)="goToPage(pageNumber)">
                {{ pageNumber }}
              </button>
            </li>
            <li class="dt-paging-button page-item" [class]="pagination?.isLastPage() ? 'disabled' : ''">
              <button class="page-link next" role="link" type="button" (click)="goToNextPage()">
                <i class="next"></i>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>

<div class="modal-header">
  <h4 class="modal-title">Adicionar arquivo</h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="cancel()">
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="modal-body">

    <div class="mb-2">
      <label class="form-label">Arquivo</label>
      
      <file-pond
        *ngIf="!fileInfo"
        [options]="filePondOptions"
        (onaddfile)="pondHandleAddFile($event)">
      </file-pond>

      <app-file-display
        *ngIf="fileInfo"
        [isEditable]="true"
        [fileInfo]="fileInfo"
        (deleteFile)="onDeleteFile()"
        (replaceFile)="onReplaceFile()"
      ></app-file-display>
      
    </div>
    <div class="mb-2">
     <label class="form-label">Tipo do anexo</label>

      <select class="form-select" formControlName="type">

      <option [ngValue]="null">Selecione</option>

      <option *ngFor="let type of attachmentTypes"
              [ngValue]="type">
        {{ type }}
      </option>

    </select>
    </div>
    <div class="mb-2">
      <label class="form-label">Descrição</label>
      <input
        type="text"
        class="form-control"
        formControlName="description"
      />
    </div>
  </div>

  <div class="modal-footer">
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="form.invalid || !file">
      Enviar
    </button>
  </div>
</form>
